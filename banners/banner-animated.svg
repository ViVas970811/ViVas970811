<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320"
     role="img" aria-label="Animated neural-pipeline banner">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <!-- Radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#58A6FF" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#58A6FF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid backdrop -->
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#21262D" stroke-width="0.5"/>
    </pattern>

    <!-- Accent gradient (used sparingly) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58A6FF"/>
      <stop offset="50%"  stop-color="#A371F7"/>
      <stop offset="100%" stop-color="#F778BA"/>
    </linearGradient>

    <!-- Reusable: a node with a pulse ring -->
    <g id="node-blue">
      <circle r="8" fill="#0D1117" stroke="#58A6FF" stroke-width="2"/>
      <circle r="5" fill="#58A6FF">
        <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle r="8" fill="none" stroke="#58A6FF" stroke-width="1.2" opacity="0.7">
        <animate attributeName="r"       values="8;22" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g id="node-purple">
      <circle r="7" fill="#0D1117" stroke="#A371F7" stroke-width="2"/>
      <circle r="4" fill="#A371F7">
        <animate attributeName="opacity" values="0.9;0.35;0.9" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g id="node-pink">
      <circle r="8" fill="#0D1117" stroke="#F778BA" stroke-width="2"/>
      <circle r="5" fill="#F778BA">
        <animate attributeName="opacity" values="1;0.25;1" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="8" fill="none" stroke="#F778BA" stroke-width="1.2" opacity="0.7">
        <animate attributeName="r"       values="8;22" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </defs>

  <!-- ────────── BACKGROUND ────────── -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Corner brackets (brand cue) -->
  <g stroke="url(#accent)" stroke-width="2" fill="none">
    <path d="M 20 20 L 60 20 M 20 20 L 20 60"/>
    <path d="M 1260 20 L 1220 20 M 1260 20 L 1260 60"/>
    <path d="M 20 300 L 60 300 M 20 300 L 20 260"/>
    <path d="M 1260 300 L 1220 300 M 1260 300 L 1260 260"/>
  </g>

  <!-- ────────── LAYER POSITIONS ──────────
       Input layer (3 nodes) at x=180
       Hidden 1 (5 nodes)    at x=440
       Hidden 2 (5 nodes)    at x=720
       Output layer (3)      at x=1000  (+ classification slots at x=1130)
  ──────────────────────────────── -->

  <!-- (Layer labels removed for a cleaner, fully-visual banner.) -->

  <!-- ────────── CONNECTION LINES ──────────
       Drawn as a single group with animated dashes simulating data flow -->
  <g stroke="#30363D" stroke-width="1" fill="none" stroke-linecap="round">
    <!-- input (180) → hidden1 (440). Inputs at y = 120, 170, 220 -->
    <g>
      <line x1="180" y1="120" x2="440" y2="90"/>
      <line x1="180" y1="120" x2="440" y2="140"/>
      <line x1="180" y1="120" x2="440" y2="190"/>
      <line x1="180" y1="170" x2="440" y2="90"/>
      <line x1="180" y1="170" x2="440" y2="140"/>
      <line x1="180" y1="170" x2="440" y2="190"/>
      <line x1="180" y1="170" x2="440" y2="240"/>
      <line x1="180" y1="220" x2="440" y2="190"/>
      <line x1="180" y1="220" x2="440" y2="240"/>
      <line x1="180" y1="220" x2="440" y2="290"/>
    </g>
    <!-- hidden1 (440, y=90,140,190,240,290) → hidden2 (720, y=90,140,190,240,290) -->
    <g>
      <line x1="440" y1="90"  x2="720" y2="90"/>
      <line x1="440" y1="90"  x2="720" y2="140"/>
      <line x1="440" y1="140" x2="720" y2="90"/>
      <line x1="440" y1="140" x2="720" y2="140"/>
      <line x1="440" y1="140" x2="720" y2="190"/>
      <line x1="440" y1="190" x2="720" y2="140"/>
      <line x1="440" y1="190" x2="720" y2="190"/>
      <line x1="440" y1="190" x2="720" y2="240"/>
      <line x1="440" y1="240" x2="720" y2="190"/>
      <line x1="440" y1="240" x2="720" y2="240"/>
      <line x1="440" y1="240" x2="720" y2="290"/>
      <line x1="440" y1="290" x2="720" y2="240"/>
      <line x1="440" y1="290" x2="720" y2="290"/>
    </g>
    <!-- hidden2 (720) → output (1000, y=120,170,220) -->
    <g>
      <line x1="720" y1="90"  x2="1000" y2="120"/>
      <line x1="720" y1="140" x2="1000" y2="120"/>
      <line x1="720" y1="140" x2="1000" y2="170"/>
      <line x1="720" y1="190" x2="1000" y2="120"/>
      <line x1="720" y1="190" x2="1000" y2="170"/>
      <line x1="720" y1="190" x2="1000" y2="220"/>
      <line x1="720" y1="240" x2="1000" y2="170"/>
      <line x1="720" y1="240" x2="1000" y2="220"/>
      <line x1="720" y1="290" x2="1000" y2="220"/>
    </g>
  </g>

  <!-- Animated flowing "current" overlay on top of connections -->
  <g stroke="url(#accent)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="6 18">
    <line x1="180" y1="120" x2="440" y2="140">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="180" y1="170" x2="440" y2="190">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="180" y1="220" x2="440" y2="240">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.1s" repeatCount="indefinite"/>
    </line>
    <line x1="440" y1="140" x2="720" y2="140">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.3s" repeatCount="indefinite"/>
    </line>
    <line x1="440" y1="190" x2="720" y2="190">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.0s" repeatCount="indefinite"/>
    </line>
    <line x1="440" y1="240" x2="720" y2="240">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="720" y1="140" x2="1000" y2="170">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="720" y1="190" x2="1000" y2="170">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="720" y1="240" x2="1000" y2="220">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ────────── NODES ────────── -->
  <!-- Input layer -->
  <use href="#node-blue" x="180" y="120"/>
  <use href="#node-blue" x="180" y="170"/>
  <use href="#node-blue" x="180" y="220"/>
  <!-- Hidden 1 -->
  <use href="#node-purple" x="440" y="90"/>
  <use href="#node-purple" x="440" y="140"/>
  <use href="#node-purple" x="440" y="190"/>
  <use href="#node-purple" x="440" y="240"/>
  <use href="#node-purple" x="440" y="290"/>
  <!-- Hidden 2 -->
  <use href="#node-purple" x="720" y="90"/>
  <use href="#node-purple" x="720" y="140"/>
  <use href="#node-purple" x="720" y="190"/>
  <use href="#node-purple" x="720" y="240"/>
  <use href="#node-purple" x="720" y="290"/>
  <!-- Output -->
  <use href="#node-pink" x="1000" y="120"/>
  <use href="#node-pink" x="1000" y="170"/>
  <use href="#node-pink" x="1000" y="220"/>

  <!-- ────────── TRAVELING DATA PARTICLES ────────── -->
  <!-- Each particle animates along a polyline through the net, staggered -->
  <g fill="#58A6FF">
    <circle r="3">
      <animateMotion dur="4.5s" repeatCount="indefinite" rotate="auto"
        path="M 60,170 L 180,170 L 440,140 L 720,140 L 1000,170 L 1140,170"/>
      <animate attributeName="fill" values="#58A6FF;#A371F7;#F778BA" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion dur="5.2s" begin="0.8s" repeatCount="indefinite" rotate="auto"
        path="M 60,220 L 180,220 L 440,240 L 720,240 L 1000,220 L 1140,220"/>
      <animate attributeName="fill" values="#58A6FF;#A371F7;#F778BA" dur="5.2s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.9;1" dur="5.2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion dur="4.8s" begin="1.6s" repeatCount="indefinite" rotate="auto"
        path="M 60,120 L 180,120 L 440,90 L 720,90 L 1000,120 L 1140,120"/>
      <animate attributeName="fill" values="#58A6FF;#A371F7;#F778BA" dur="4.8s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.9;1" dur="4.8s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion dur="5.5s" begin="2.4s" repeatCount="indefinite" rotate="auto"
        path="M 60,170 L 180,170 L 440,190 L 720,190 L 1000,170 L 1140,170"/>
      <animate attributeName="fill" values="#58A6FF;#A371F7;#F778BA" dur="5.5s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.9;1" dur="5.5s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion dur="4.2s" begin="3.2s" repeatCount="indefinite" rotate="auto"
        path="M 60,220 L 180,220 L 440,290 L 720,290 L 1000,220 L 1140,220"/>
      <animate attributeName="fill" values="#58A6FF;#A371F7;#F778BA" dur="4.2s" begin="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.5;0.9;1" dur="4.2s" begin="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ────────── PREDICTION BINS (right edge) ────────── -->
  <g font-family="'JetBrains Mono', monospace" font-size="11">
    <g transform="translate(1110,108)">
      <rect width="110" height="24" rx="3" fill="#161B22" stroke="#58A6FF" stroke-width="1"/>
      <text x="55" y="16" text-anchor="middle" fill="#58A6FF">class_a  0.94</text>
    </g>
    <g transform="translate(1110,158)">
      <rect width="110" height="24" rx="3" fill="#161B22" stroke="#A371F7" stroke-width="1"/>
      <text x="55" y="16" text-anchor="middle" fill="#A371F7">class_b  0.03</text>
    </g>
    <g transform="translate(1110,208)">
      <rect width="110" height="24" rx="3" fill="#161B22" stroke="#F778BA" stroke-width="1"/>
      <text x="55" y="16" text-anchor="middle" fill="#F778BA">class_c  0.03</text>
    </g>
  </g>

  <!-- ────────── LOSS CURVE (top-left mini-chart, away from prediction bins) ────────── -->
  <g transform="translate(60,28)" font-family="'JetBrains Mono', monospace" font-size="9" fill="#484F58">
    <text x="0" y="8">loss curve</text>
    <rect x="0" y="12" width="180" height="28" fill="none" stroke="#21262D"/>
    <polyline points="0,14 25,18 45,22 65,30 90,34 115,36 140,38 165,39 178,40"
              fill="none" stroke="#58A6FF" stroke-width="1.5"
              stroke-dasharray="300" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" values="300;0;0" keyTimes="0;0.7;1"
               dur="6s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- ────────── SIGNATURE (minimal, just the handle) ────────── -->
  <g font-family="'JetBrains Mono', monospace">
    <text x="1140" y="304" font-size="11" fill="#484F58">@ViVas970811</text>
  </g>
</svg>
