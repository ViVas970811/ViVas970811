<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Vivek Vasisht Ediga — ML Engineer banner">
  <defs>
    <!-- Gradient backdrop -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <!-- Soft radial glow behind the name -->
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#58A6FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#58A6FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Mesh / graph pattern -->
    <pattern id="mesh" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363D" stroke-width="0.5"/>
    </pattern>

    <!-- Accent stroke gradient -->
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58A6FF"/>
      <stop offset="50%"  stop-color="#A371F7"/>
      <stop offset="100%" stop-color="#F778BA"/>
    </linearGradient>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#mesh)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Neural-net node motif (left + right accents) -->
  <g stroke="#30363D" stroke-width="1" fill="none" opacity="0.8">
    <!-- Left cluster -->
    <circle cx="110" cy="90"  r="6" fill="#58A6FF"/>
    <circle cx="110" cy="160" r="6" fill="#58A6FF"/>
    <circle cx="110" cy="230" r="6" fill="#58A6FF"/>
    <circle cx="210" cy="60"  r="6" fill="#A371F7"/>
    <circle cx="210" cy="130" r="6" fill="#A371F7"/>
    <circle cx="210" cy="200" r="6" fill="#A371F7"/>
    <circle cx="210" cy="270" r="6" fill="#A371F7"/>
    <line x1="110" y1="90"  x2="210" y2="60"  />
    <line x1="110" y1="90"  x2="210" y2="130" />
    <line x1="110" y1="160" x2="210" y2="60"  />
    <line x1="110" y1="160" x2="210" y2="130" />
    <line x1="110" y1="160" x2="210" y2="200" />
    <line x1="110" y1="230" x2="210" y2="200" />
    <line x1="110" y1="230" x2="210" y2="270" />

    <!-- Right cluster -->
    <circle cx="1170" cy="90"  r="6" fill="#F778BA"/>
    <circle cx="1170" cy="160" r="6" fill="#F778BA"/>
    <circle cx="1170" cy="230" r="6" fill="#F778BA"/>
    <circle cx="1070" cy="60"  r="6" fill="#A371F7"/>
    <circle cx="1070" cy="130" r="6" fill="#A371F7"/>
    <circle cx="1070" cy="200" r="6" fill="#A371F7"/>
    <circle cx="1070" cy="270" r="6" fill="#A371F7"/>
    <line x1="1170" y1="90"  x2="1070" y2="60"  />
    <line x1="1170" y1="90"  x2="1070" y2="130" />
    <line x1="1170" y1="160" x2="1070" y2="130" />
    <line x1="1170" y1="160" x2="1070" y2="200" />
    <line x1="1170" y1="230" x2="1070" y2="200" />
    <line x1="1170" y1="230" x2="1070" y2="270" />
  </g>

  <!-- Accent corner strokes -->
  <g stroke="url(#strokeGrad)" stroke-width="2" fill="none">
    <path d="M 24 24 L 64 24 M 24 24 L 24 64"/>
    <path d="M 1256 24 L 1216 24 M 1256 24 L 1256 64"/>
    <path d="M 24 296 L 64 296 M 24 296 L 24 256"/>
    <path d="M 1256 296 L 1216 296 M 1256 296 L 1256 256"/>
  </g>

  <!-- Name -->
  <text x="640" y="148" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace"
        font-weight="700" font-size="64" fill="#E6EDF3" letter-spacing="2">
    Vivek Vasisht Ediga
  </text>

  <!-- Accent line under name -->
  <line x1="440" y1="170" x2="840" y2="170" stroke="url(#strokeGrad)" stroke-width="2"/>

  <!-- Tagline -->
  <text x="640" y="210" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace"
        font-weight="400" font-size="22" fill="#8B949E" letter-spacing="1">
    ML Engineer  ·  MS Data Science @ UMD  ·  Building production ML systems
  </text>

  <!-- Pill tags -->
  <g font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace" font-size="14">
    <g transform="translate(480,246)">
      <rect width="100" height="30" rx="15" fill="#21262D" stroke="#30363D"/>
      <text x="50" y="20" text-anchor="middle" fill="#58A6FF">Computer Vision</text>
    </g>
    <g transform="translate(590,246)">
      <rect width="60" height="30" rx="15" fill="#21262D" stroke="#30363D"/>
      <text x="30" y="20" text-anchor="middle" fill="#A371F7">NLP</text>
    </g>
    <g transform="translate(660,246)">
      <rect width="140" height="30" rx="15" fill="#21262D" stroke="#30363D"/>
      <text x="70" y="20" text-anchor="middle" fill="#F778BA">Graph Learning</text>
    </g>
  </g>
</svg>
