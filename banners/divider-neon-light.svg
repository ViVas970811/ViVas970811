<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 24" width="1280" height="24"
     role="img" aria-label="Neon divider (light)">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#d6246e" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#d6246e" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#0091a8" stop-opacity="1"/>
      <stop offset="82%"  stop-color="#d6246e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d6246e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="11" width="1280" height="1.2" fill="url(#line)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </rect>

  <circle cy="11.6" r="2.2" fill="#0091a8" filter="url(#glow)">
    <animate attributeName="cx"      values="100;1180;100"  dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0"     keyTimes="0;0.05;0.5;0.95;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(640 12)" fill="#d6246e" filter="url(#glow)">
    <polygon points="0,-5 5,0 0,5 -5,0">
      <animate attributeName="fill" values="#d6246e;#0091a8;#d6246e" dur="4s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g fill="#8e2de2" filter="url(#glow)">
    <circle cx="40"   cy="12" r="1.8" opacity="0.55"/>
    <circle cx="1240" cy="12" r="1.8" opacity="0.55"/>
  </g>
</svg>
