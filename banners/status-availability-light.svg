<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 40" width="820" height="40"
     role="img" aria-label="Status: graduating May 2026, open to ML Engineer roles, evivek@umd.edu (light variant)">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#d6246e"/>
      <stop offset="50%"  stop-color="#8e2de2"/>
      <stop offset="100%" stop-color="#0091a8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#1a0033" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect x="1" y="1" width="818" height="38" rx="4" fill="#fff5fa" stroke="url(#frame)" stroke-width="1.2"/>
  <rect x="1" y="1" width="818" height="38" rx="4" fill="url(#scanlines)" pointer-events="none"/>

  <g transform="translate(18 20)">
    <circle r="4.5" fill="#00a85a" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="4.5" fill="none" stroke="#00a85a" stroke-width="1" opacity="0.55">
      <animate attributeName="r"       values="4.5;10" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="600">
    <text x="36" y="25" fill="#d6246e" letter-spacing="1.2" filter="url(#glow)">GRADUATING MAY 2026</text>
    <text x="210" y="25" fill="#8e2de2" letter-spacing="1.2">·</text>
    <text x="225" y="25" fill="#0091a8" letter-spacing="1.2" filter="url(#glow)">OPEN TO ML ENGINEER ROLES</text>
    <text x="475" y="25" fill="#8e2de2" letter-spacing="1.2">·</text>
    <text x="490" y="25" fill="#d6246e" letter-spacing="1" filter="url(#glow)">evivek@umd.edu</text>
  </g>

  <g stroke="#0091a8" stroke-width="1" fill="none" opacity="0.85">
    <path d="M 804 8 L 811 8 L 811 15"/>
    <path d="M 804 32 L 811 32 L 811 25"/>
  </g>

  <rect x="2" y="20" width="2" height="18" fill="#0091a8" opacity="0.45" filter="url(#glow)">
    <animate attributeName="x"       values="2;816;2" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.45;0" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
