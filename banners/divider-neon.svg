<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 24" width="1280" height="24"
     role="img" aria-label="Neon divider">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff2e9f" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#ff2e9f" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#05d9e8" stop-opacity="1"/>
      <stop offset="82%"  stop-color="#ff2e9f" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff2e9f" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- main line -->
  <rect x="0" y="11" width="1280" height="1.2" fill="url(#line)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- traveling spark -->
  <circle cy="11.6" r="2.2" fill="#05d9e8" filter="url(#glow)">
    <animate attributeName="cx"      values="100;1180;100"  dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0"     keyTimes="0;0.05;0.5;0.95;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- center diamond marker -->
  <g transform="translate(640 12)" fill="#ff2e9f" filter="url(#glow)">
    <polygon points="0,-5 5,0 0,5 -5,0">
      <animate attributeName="fill" values="#ff2e9f;#05d9e8;#ff2e9f" dur="4s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- end caps -->
  <g fill="#b967ff" filter="url(#glow)">
    <circle cx="40"   cy="12" r="1.8" opacity="0.6"/>
    <circle cx="1240" cy="12" r="1.8" opacity="0.6"/>
  </g>
</svg>
