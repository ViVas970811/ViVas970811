<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120"
     role="img" aria-label="On repeat: I Ain't Worried by OneRepublic from Top Gun: Maverick">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#58A6FF"/>
      <stop offset="50%"  stop-color="#A371F7"/>
      <stop offset="100%" stop-color="#F778BA"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="art" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0.6" y="0.6" width="478.8" height="118.8" rx="8" fill="url(#panel)" stroke="url(#border)" stroke-width="1.2"/>

  <!-- "album art" tile with jet silhouette -->
  <g transform="translate(14 14)">
    <rect width="92" height="92" rx="4" fill="url(#art)" stroke="#30363D" stroke-width="1"/>

    <!-- sun / horizon accent -->
    <circle cx="46" cy="68" r="26" fill="#F778BA" opacity="0.18"/>
    <line x1="6" y1="68" x2="86" y2="68" stroke="#F778BA" stroke-width="0.6" opacity="0.5"/>

    <!-- jet silhouette (simplified F/A-18) -->
    <g fill="#C9D1D9" transform="translate(46 44)">
      <path d="M -22,0 L -8,-2 L -2,-6 L 10,-6 L 18,-2 L 22,0 L 18,2 L 10,6 L -2,6 L -8,2 Z"/>
      <path d="M -4,-14 L 0,-16 L 4,-14 L 2,-4 L -2,-4 Z"/>
      <path d="M -10,-4 L -14,-10 L -10,-10 L -4,-4 Z"/>
      <path d="M -10,4 L -14,10 L -10,10 L -4,4 Z"/>
    </g>

    <!-- animated contrail -->
    <line x1="18" y1="44" x2="6" y2="44" stroke="#58A6FF" stroke-width="1" opacity="0.7" stroke-linecap="round" stroke-dasharray="2 3">
      <animate attributeName="stroke-dashoffset" from="5" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>

    <!-- small title at bottom of tile -->
    <text x="46" y="86" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="7" fill="#8B949E" letter-spacing="1.2">TOP GUN : MAVERICK</text>
  </g>

  <!-- text -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" transform="translate(120 14)">
    <text x="0" y="12" font-size="10" fill="#8B949E" letter-spacing="1.5">ON REPEAT · APPLE MUSIC</text>
    <text x="0" y="42" font-size="16" fill="#C9D1D9" font-weight="600">I Ain't Worried</text>
    <text x="0" y="62" font-size="12" fill="#58A6FF">OneRepublic</text>
    <text x="0" y="82" font-size="10" fill="#484F58">Top Gun: Maverick (Music from the Motion Picture)</text>

    <!-- idle progress bar -->
    <rect x="0" y="92" width="340" height="2" rx="1" fill="#21262D"/>
    <rect x="0" y="92" width="0"   height="2" rx="1" fill="#A371F7">
      <animate attributeName="width" values="0;340;0" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- pink "favorite" indicator instead of live dot -->
  <g transform="translate(456 18)">
    <path d="M 0,-4 L 1.2,-1.2 L 4,-1.2 L 1.8,0.8 L 2.6,4 L 0,2 L -2.6,4 L -1.8,0.8 L -4,-1.2 L -1.2,-1.2 Z"
          fill="#F778BA" opacity="0.9"/>
  </g>
</svg>
