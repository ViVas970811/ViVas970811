<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120"
     role="img" aria-label="Now playing — Apple Music (via last.fm bridge, pending configuration)">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#58A6FF"/>
      <stop offset="50%"  stop-color="#A371F7"/>
      <stop offset="100%" stop-color="#F778BA"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0.6" y="0.6" width="478.8" height="118.8" rx="8" fill="url(#panel)" stroke="url(#border)" stroke-width="1.2"/>

  <!-- album art placeholder (left) -->
  <g transform="translate(14 14)">
    <rect width="92" height="92" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <!-- waveform bars -->
    <g transform="translate(46 46)" stroke="#58A6FF" stroke-width="2" stroke-linecap="round">
      <line x1="-22" y1="0" x2="-22" y2="-6"><animate attributeName="y2" values="-6;-18;-6" dur="1.8s" repeatCount="indefinite"/></line>
      <line x1="-14" y1="0" x2="-14" y2="-14"><animate attributeName="y2" values="-14;-4;-14" dur="1.5s" repeatCount="indefinite"/></line>
      <line x1="-6"  y1="0" x2="-6"  y2="-10"><animate attributeName="y2" values="-10;-22;-10" dur="2.1s" repeatCount="indefinite"/></line>
      <line x1="2"   y1="0" x2="2"   y2="-18"><animate attributeName="y2" values="-18;-6;-18" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="10"  y1="0" x2="10"  y2="-12"><animate attributeName="y2" values="-12;-20;-12" dur="1.9s" repeatCount="indefinite"/></line>
      <line x1="18"  y1="0" x2="18"  y2="-8"><animate attributeName="y2" values="-8;-16;-8" dur="2.3s" repeatCount="indefinite"/></line>
    </g>
    <text x="46" y="76" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#484F58">♫</text>
  </g>

  <!-- text (right) -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" transform="translate(120 14)">
    <text x="0" y="12" font-size="10" fill="#8B949E" letter-spacing="1.5">NOW PLAYING · APPLE MUSIC</text>
    <text x="0" y="42" font-size="16" fill="#C9D1D9" font-weight="600">Awaiting first scrobble</text>
    <text x="0" y="62" font-size="12" fill="#58A6FF">set LASTFM_USERNAME · LASTFM_API_KEY</text>
    <text x="0" y="82" font-size="10" fill="#484F58">bridge: Apple Music → last.fm → GitHub Action → this card</text>

    <!-- progress bar -->
    <rect x="0" y="92" width="340" height="2" rx="1" fill="#21262D"/>
    <rect x="0" y="92" width="0"   height="2" rx="1" fill="#A371F7">
      <animate attributeName="width" values="0;340;0" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- live dot (dimmed since not actually live yet) -->
  <g transform="translate(456 18)">
    <circle r="4" fill="#484F58"/>
  </g>
</svg>
