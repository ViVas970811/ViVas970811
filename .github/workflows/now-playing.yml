# ═══════════════════════════════════════════════════════════════════════
# Now-playing — Apple Music card via last.fm bridge.
#
# Setup (one-time, user side):
#   1. Scrobble Apple Music to last.fm via Marvis Pro (iOS) or NepTunes (macOS)
#   2. Get a free last.fm API key: https://www.last.fm/api/account/create
#   3. Add two repo secrets:  LASTFM_API_KEY  and  LASTFM_USERNAME
#
# If either secret is missing, the workflow exits cleanly and leaves the
# existing banners/now-playing.svg fallback in place — no broken state.
# ═══════════════════════════════════════════════════════════════════════

name: Now Playing
on:
  schedule: [{cron: "*/10 * * * *"}]   # every 10 minutes
  workflow_dispatch:

concurrency:
  group: now-playing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate on secrets present
        id: gate
        env:
          LASTFM_API_KEY:  ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
        run: |
          if [ -z "$LASTFM_API_KEY" ] || [ -z "$LASTFM_USERNAME" ]; then
            echo "LASTFM_API_KEY or LASTFM_USERNAME not set — keeping fallback card, exiting."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch most recent scrobble
        if: steps.gate.outputs.run == 'true'
        env:
          LASTFM_API_KEY:  ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
        run: |
          curl -sS "https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LASTFM_USERNAME}&api_key=${LASTFM_API_KEY}&format=json&limit=1" \
            > /tmp/lastfm.json
          jq . /tmp/lastfm.json > /dev/null

      - name: Render card SVG
        if: steps.gate.outputs.run == 'true'
        run: |
          python3 - <<'PY'
          import json, base64, urllib.request, html, pathlib
          d = json.load(open('/tmp/lastfm.json'))
          tracks = d.get('recenttracks', {}).get('track', [])
          if not tracks:
              print("No recent tracks; leaving fallback.")
              raise SystemExit(0)
          t = tracks[0] if isinstance(tracks, list) else tracks
          name   = html.escape((t.get('name') or 'Unknown track')[:42])
          artist = html.escape((t.get('artist', {}).get('#text') or 'Unknown artist')[:42])
          album  = html.escape((t.get('album',  {}).get('#text') or '')[:42])
          now = t.get('@attr', {}).get('nowplaying') == 'true'
          status_label = 'NOW PLAYING' if now else 'JUST PLAYED'
          dot_color    = '#3FB950' if now else '#8B949E'

          # best-effort album art (may 404; we fall back to waveform placeholder)
          art_url = ''
          for im in t.get('image', []):
              if im.get('size') == 'extralarge' and im.get('#text'):
                  art_url = im['#text']; break
          art_b64 = ''
          if art_url:
              try:
                  raw = urllib.request.urlopen(art_url, timeout=5).read()
                  art_b64 = base64.b64encode(raw).decode()
              except Exception:
                  pass

          art_block = (
              f'<image x="14" y="14" width="92" height="92" href="data:image/jpeg;base64,{art_b64}"/>'
              if art_b64 else
              '<rect x="14" y="14" width="92" height="92" rx="4" fill="#0D1117" stroke="#30363D"/>'
              '<text x="60" y="68" text-anchor="middle" font-family="monospace" font-size="28" fill="#484F58">♫</text>'
          )

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120"
     role="img" aria-label="Now playing: {name} by {artist}">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#58A6FF"/>
      <stop offset="50%"  stop-color="#A371F7"/>
      <stop offset="100%" stop-color="#F778BA"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <rect x="0.6" y="0.6" width="478.8" height="118.8" rx="8" fill="url(#panel)" stroke="url(#border)" stroke-width="1.2"/>
  {art_block}
  <g font-family="'JetBrains Mono', ui-monospace, monospace" transform="translate(120 14)">
    <text x="0" y="12" font-size="10" fill="#8B949E" letter-spacing="1.5">{status_label} · APPLE MUSIC</text>
    <text x="0" y="42" font-size="16" fill="#C9D1D9" font-weight="600">{name}</text>
    <text x="0" y="62" font-size="12" fill="#58A6FF">{artist}</text>
    <text x="0" y="82" font-size="10" fill="#484F58">{album}</text>
  </g>
  <circle cx="456" cy="18" r="4" fill="{dot_color}">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="{'indefinite' if now else '1'}"/>
  </circle>
</svg>
'''
          pathlib.Path('banners/now-playing.svg').write_text(svg, encoding='utf-8')
          print(f"Rendered: {name} — {artist} ({'live' if now else 'recent'})")
          PY

      - name: Commit if changed
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name  "ViVas970811"
          git config user.email "140938681+ViVas970811@users.noreply.github.com"
          if ! git diff --quiet banners/now-playing.svg; then
            git add banners/now-playing.svg
            git commit -m "Update now-playing card - [Skip GitHub Action]"
            git push
          else
            echo "No change."
          fi
