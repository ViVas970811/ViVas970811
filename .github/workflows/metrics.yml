name: Metrics
on:
  # Schedule updates (every ~6 hours)
  schedule: [{cron: "0 */6 * * *"}]
  # Trigger on commit to default branch
  push: {branches: ["main"]}
  # Manual trigger
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Classic metrics card — commits, issues, PRs
  # ─────────────────────────────────────────
  overview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViVas970811
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_padding: 0, 2px

  # ─────────────────────────────────────────
  # Achievements
  # Safer config for newer accounts: `secrets: no` (avoids hidden-achievement data
  # failures) and `detailed` display (more forgiving than compact).
  # ─────────────────────────────────────────
  achievements:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViVas970811
          base: ""
          retries: 3
          retries_delay: 300
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: no
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

  # ─────────────────────────────────────────
  # Isometric calendar (half-year)
  # ─────────────────────────────────────────
  isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViVas970811
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

  # ─────────────────────────────────────────
  # Languages — indepth + colors
  # ─────────────────────────────────────────
  languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViVas970811
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

  # ─────────────────────────────────────────
  # Habits (coding rhythm: when do you commit?)
  # Safer config for newer accounts: fewer commits, shorter window, facts only.
  # `plugin_habits_charts: yes` + `plugin_habits_facts: yes` together often
  # crashes on accounts with sparse commit history — we keep facts only.
  # ─────────────────────────────────────────
  habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViVas970811
          base: ""
          retries: 3
          retries_delay: 300
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 7
          plugin_habits_facts: yes
          plugin_habits_charts: no

  # ─────────────────────────────────────────
  # Followup (open/closed PRs + issues)
  # ─────────────────────────────────────────
  followup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.followup.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViVas970811
          base: ""
          plugin_followup: yes
          plugin_followup_sections: repositories

  # ─────────────────────────────────────────
  # Topics (areas you work in, icons mode)
  # ─────────────────────────────────────────
  topics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ViVas970811
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 15
